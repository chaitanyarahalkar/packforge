[build]
target = "x86_64-unknown-linux-musl"

[target.x86_64-unknown-linux-musl]
linker = "rust-lld"
rustflags = [
  "-C", "linker-flavor=ld.lld",
  "-C", "link-self-contained=no",
  "-C", "link-arg=-nostdlib",
  "-C", "link-arg=-static",
  "-C", "link-arg=--gc-sections",
  "-C", "link-arg=-z",
  "-C", "link-arg=noexecstack",
  "-C", "relocation-model=static",
]
