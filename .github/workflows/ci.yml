name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: clippy,rustfmt
          targets: x86_64-unknown-linux-musl
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.4
          cache: false
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace --locked
      - name: Benchmark contract
        run: |
          python3 scripts/benchmark_contract.py validate-corpus
          python3 -m unittest discover -s scripts/tests -v
      - name: Fuzz harnesses compile
        run: cargo check --manifest-path fuzz/Cargo.toml --locked
      - name: Runtime decoder and digest tests
        working-directory: runtime/linux-x86_64
        run: cargo test --target x86_64-unknown-linux-gnu --locked
      - name: Runtime Clippy
        working-directory: runtime/linux-x86_64
        run: cargo clippy --bin packforge-runtime-linux-x86-64 --target x86_64-unknown-linux-musl --locked -- -D warnings
      - name: Reproducible runtime artifact
        run: bash scripts/build-runtime.sh --check
      - name: Static ELF round trip
        run: bash scripts/ci-linux-smoke.sh
      - name: Self-contained executable round trip
        run: bash scripts/ci-linux-executable-smoke.sh

  benchmark:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: x86_64-unknown-linux-musl
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.4
          cache: false
      - name: Install benchmark tools
        run: sudo apt-get update && sudo apt-get install -y g++ curl xz-utils time
      - name: Native executable benchmark
        env:
          PACKFORGE_BENCHMARK_RAW: benchmark-output/raw-samples.tsv
          PACKFORGE_DROP_CACHES: "1"
        run: |
          mkdir -p benchmark-output
          bash scripts/benchmark-linux-executable.sh 21 7 > benchmark-output/summary.tsv
          python3 scripts/benchmark_contract.py metadata \
            --output benchmark-output/metadata.json \
            --source-run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --runner "$RUNNER_NAME"
          python3 scripts/benchmark_contract.py report \
            --summary benchmark-output/summary.tsv \
            --raw benchmark-output/raw-samples.tsv \
            --metadata benchmark-output/metadata.json \
            --output benchmark-output/report.json \
            --cold-cache-reset linux_drop_caches_3
          python3 scripts/benchmark_contract.py evaluate \
            benchmark-output/report.json > benchmark-output/gates.json
      - name: Show benchmark
        run: |
          column -t -s $'\t' benchmark-output/summary.tsv
          cat benchmark-output/gates.json
      - uses: actions/upload-artifact@v4
        with:
          name: packforge-linux-x86-64-benchmark
          path: benchmark-output
