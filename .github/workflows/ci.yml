name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: clippy,rustfmt
          targets: x86_64-unknown-linux-musl
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.4
          cache: false
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace --locked
      - name: Benchmark contract
        run: |
          python3 scripts/benchmark_contract.py validate-corpus
          python3 -m unittest discover -s scripts/tests -v
      - name: Fuzz harnesses compile
        run: cargo check --manifest-path fuzz/Cargo.toml --locked
      - name: Runtime decoder and digest tests
        working-directory: runtime/linux-x86_64
        run: cargo test --target x86_64-unknown-linux-gnu --locked
      - name: Runtime Clippy
        working-directory: runtime/linux-x86_64
        run: |
          cargo clippy --bin packforge-runtime-linux-x86-64 \
            --target x86_64-unknown-linux-musl --locked -- -D warnings
          cargo clippy --bin packforge-runtime-v2-linux-x86-64 \
            --target x86_64-unknown-linux-musl --features lzma --locked -- -D warnings
      - name: Reproducible runtime artifact
        run: bash scripts/build-runtime.sh --check
      - name: Reproducible runtime v2 artifact
        env:
          PACKFORGE_RUNTIME_V2_OUTPUT: target/runtime-v2-linux/loader-v2
        run: bash scripts/build-runtime-v2.sh --check
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: packforge-runtime-v2-linux
          path: target/runtime-v2-linux/loader-v2
      - name: LZMA size feasibility gate
        run: bash scripts/ci-lzma-spike.sh
      - name: Static ELF round trip
        env:
          PACKFORGE_CONTAINER_DIGESTS: target/container-corpus/container-digests-linux.tsv
          PACKFORGE_CORPUS_OUTPUT: target/container-corpus/inputs
        run: bash scripts/ci-linux-smoke.sh
      - name: Executable v2 host round trip
        run: |
          cargo run --release --locked -p packforge-core \
            --example v2_host_roundtrip -- \
            target/container-corpus/inputs/hello-c \
            target/container-corpus/inputs/hello-cpp \
            target/container-corpus/inputs/hello-rust \
            target/container-corpus/inputs/hello-go
      - name: Self-contained executable round trip
        run: bash scripts/ci-linux-executable-smoke.sh
      - name: Install dependency auditor
        run: cargo install cargo-audit --version 0.22.2 --locked
      - name: Audit every shipped and test lockfile
        run: |
          for lockfile in \
            Cargo.lock \
            fuzz/Cargo.lock \
            runtime/linux-x86_64/Cargo.lock \
            runtime/lzma-spike/Cargo.lock \
            runtime/zstd-spike/Cargo.lock; do
            cargo audit --deny warnings --file "$lockfile"
          done
      - name: Archive deterministic container corpus
        run: tar -C target/container-corpus -cf target/container-corpus/corpus.tar inputs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: packforge-container-corpus-linux
          path: |
            target/container-corpus/container-digests-linux.tsv
            target/container-corpus/corpus.tar

  container-reproducibility:
    needs: rust
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.97.0
      - uses: actions/download-artifact@v4
        with:
          name: packforge-container-corpus-linux
          path: target/container-reproducibility
      - name: Repack Linux corpus on macOS ARM64
        run: |
          mkdir -p target/container-reproducibility/inputs
          tar -C target/container-reproducibility \
            -xf target/container-reproducibility/corpus.tar
          bash scripts/ci-container-repack.sh \
            target/container-reproducibility/inputs \
            target/container-reproducibility/container-digests-macos.tsv
          cmp \
            target/container-reproducibility/container-digests-linux.tsv \
            target/container-reproducibility/container-digests-macos.tsv
      - uses: actions/upload-artifact@v4
        with:
          name: packforge-container-reproducibility
          path: target/container-reproducibility/container-digests-macos.tsv

  runtime-kernel-matrix:
    name: runtime (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: x86_64-unknown-linux-musl
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.4
          cache: false
      - name: Record native runner and require full ASLR
        run: |
          uname -a
          cat /etc/os-release
          test "$(cat /proc/sys/kernel/randomize_va_space)" -eq 2
      - name: Direct-runtime compatibility smoke
        run: bash scripts/ci-linux-executable-smoke.sh

  benchmark:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: x86_64-unknown-linux-musl
      - uses: actions/setup-go@v6
        with:
          go-version: 1.26.4
          cache: false
      - name: Install benchmark tools
        run: sudo apt-get update && sudo apt-get install -y g++ curl xz-utils time strace
      - name: Native executable benchmark
        env:
          PACKFORGE_BENCHMARK_RAW: benchmark-output/raw-samples.tsv
          PACKFORGE_RUNTIME_TRACES: benchmark-output/runtime-traces
          PACKFORGE_CODEC_SPIKE_OUTPUT: benchmark-output/m2-codec-spike.tsv
          PACKFORGE_ASM_ORACLE_OUTPUT: benchmark-output/m2-lzma-asm.tsv
          PACKFORGE_PHASE_ITERATIONS: "7"
          PACKFORGE_DROP_CACHES: "1"
        run: |
          mkdir -p benchmark-output
          bash scripts/benchmark-linux-executable.sh 21 7 > benchmark-output/summary.tsv
          python3 scripts/benchmark_contract.py metadata \
            --output benchmark-output/metadata.json \
            --source-run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            --runner "$RUNNER_NAME"
          python3 scripts/benchmark_contract.py report \
            --summary benchmark-output/summary.tsv \
            --raw benchmark-output/raw-samples.tsv \
            --metadata benchmark-output/metadata.json \
            --output benchmark-output/report.json \
            --packforge-profile balanced \
            --cold-cache-reset linux_drop_caches_3
          python3 scripts/benchmark_contract.py evaluate \
            benchmark-output/report.json > benchmark-output/gates.json
          python3 scripts/m2_performance_contract.py build \
            --benchmark-report benchmark-output/report.json \
            --trace-directory benchmark-output/runtime-traces \
            --loader runtime/artifacts/linux-x86_64/loader-v2 \
            --direct-mapping \
            --output benchmark-output/m2-report.json
          python3 scripts/m2_performance_contract.py evaluate \
            benchmark-output/m2-report.json > benchmark-output/m2-gates.json
      - name: Show benchmark
        run: |
          column -t -s $'\t' benchmark-output/summary.tsv
          cat benchmark-output/gates.json
          cat benchmark-output/m2-gates.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: packforge-linux-x86-64-benchmark
          path: benchmark-output
